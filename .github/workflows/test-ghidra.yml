name: Test Ghidra 🐉 Extension

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - 'docs/**'
      - '*.md'

permissions:
  contents: write
  actions: read
  checks: write
  security-events: write

jobs:
  test-python-unit:
    name: Test Python CLI Unit Tests 🐍
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 🐍
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install dependencies
      working-directory: ./cli
      run: |
        uv pip install --system -e .
        uv pip install --system pytest

    - name: Run Python unit tests
      working-directory: ./cli
      run: |
        PYTHONPATH=src pytest tests/ -v

    - name: Test CLI import
      run: |
        python -c "from reverse_engineering_assistant import ReVaSession, find_free_port; print('✓ Python API import successful')"

  test-python-integration:
    name: Test Python CLI Integration 🔗
    runs-on: ubuntu-latest
    needs: test-python-unit
    steps:
    - uses: actions/checkout@v4

    - name: Set up Java 🍵
      uses: actions/setup-java@v4
      with:
        java-version: "21"
        distribution: "microsoft"

    - name: Install Ghidra 🐉
      uses: antoniovazquezblanco/setup-ghidra@v2.0.12
      with:
        version: "latest"

    - name: Setup Xvfb for headless testing
      run: |
        sudo apt-get update && sudo apt-get install -y xvfb
        Xvfb :99 -nolisten tcp &
        echo "DISPLAY=:99" >> $GITHUB_ENV

    - name: Setup Gradle 🔧
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: "8.14"

    - name: Build and Install ReVa Extension 🔨
      run: |
        gradle buildExtension
        # Extract the built extension to Ghidra
        unzip -o dist/ghidra_*_ReVa.zip -d $GHIDRA_INSTALL_DIR/Ghidra/Extensions/

    - name: Set up Python 🐍
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install Python dependencies
      working-directory: ./cli
      run: |
        uv pip install --system -e .
        uv pip install --system pytest pyghidra

    - name: Test Python CLI with real Ghidra
      working-directory: ./cli
      run: |
        # Basic import test with Ghidra environment
        export GHIDRA_INSTALL_DIR="${{ env.GHIDRA_INSTALL_DIR }}"
        echo "Ghidra installed at: $GHIDRA_INSTALL_DIR"
        echo "ReVa extension files:"
        find "$GHIDRA_INSTALL_DIR/Ghidra/Extensions" -name "*ReVa*" -type f | head -5
        
        # Test ReVaSession constructor (should not require PyGhidra initialization)
        python -c "
        import os
        print('Testing ReVaSession with Ghidra environment...')
        from reverse_engineering_assistant import ReVaSession, find_free_port
        # Test constructor only - don't try to start() since that requires PyGhidra
        session = ReVaSession(['/bin/ls'], quiet=True)
        print(f'✓ ReVaSession constructor successful')
        print(f'✓ Ghidra path detected: {session.ghidra_path}')
        print(f'✓ Port assigned: {session.port}')
        "
      env:
        DISPLAY: :99

  test:
    strategy:
      matrix:
        os: [ubuntu-latest]
        ghidra-version: [
            "11.4.1",
            "11.4",
            "11.3.2",
            "11.3.1",
            "11.3",
            "latest",
        ]
    name: Test on Ghidra ${{ matrix.ghidra-version }}
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Java 🍵
      uses: actions/setup-java@v4
      with:
        java-version: "21"
        distribution: "microsoft"

    - name: Install Ghidra 🐉
      uses: antoniovazquezblanco/setup-ghidra@v2.0.12
      with:
        version: ${{ matrix.ghidra-version }}

    - name: Setup Xvfb for headless testing
      run: |
        sudo apt-get update && sudo apt-get install -y xvfb
        Xvfb :99 -nolisten tcp &
        echo "DISPLAY=:99" >> $GITHUB_ENV


    - name: Setup Gradle 🔧
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: "8.14"

    - name: Build Extension 🔨
      run: gradle buildExtension

    - name: Run Unit Tests 🧪
      run: gradle test --info
      env:
        _JAVA_OPTIONS: "-Djava.awt.headless=true"

    - name: Run Integration Tests 🖥️
      run: gradle integrationTest --info
      env:
        DISPLAY: :99

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.ghidra-version }}
        path: |
          build/reports/tests/
          build/test-results/
          build/reports/integrationTest/
          build/test-results/integrationTest/
        if-no-files-found: ignore

    - name: Test Summary
      uses: test-summary/action@v2
      with:
        show: "fail, skip"
        paths: |
          build/test-results/**/TEST-*.xml
      if: always()

  lint:
    name: Lint and Check 🔍
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Java 🍵
      uses: actions/setup-java@v4
      with:
        java-version: "21"
        distribution: "microsoft"

    - name: Install Ghidra 🐉
      uses: antoniovazquezblanco/setup-ghidra@v2.0.12
      with:
        version: "latest"

    - name: Setup Xvfb for headless testing
      run: |
        sudo apt-get update && sudo apt-get install -y xvfb
        Xvfb :99 -nolisten tcp &
        echo "DISPLAY=:99" >> $GITHUB_ENV

    - name: Setup Gradle 🔧
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: "8.14"
        dependency-graph: generate-and-submit
        dependency-graph-continue-on-failure: true

    - name: Check code compilation
      run: gradle compileJava

    - name: Check test compilation
      run: gradle compileTestJava

  codeql:
    name: CodeQL Security Analysis 🔒
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java 🍵
      uses: actions/setup-java@v4
      with:
        java-version: "21"
        distribution: "microsoft"

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: java
        # Use security-extended queries for more thorough analysis
        queries: security-extended,security-and-quality

    - name: Install Ghidra 🐉
      uses: antoniovazquezblanco/setup-ghidra@v2.0.12
      with:
        version: "latest"


    - name: Setup Gradle for CodeQL 🔧
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: "8.14"

    - name: Build Extension for CodeQL Analysis 🔨
      run: gradle buildExtension

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:java"
