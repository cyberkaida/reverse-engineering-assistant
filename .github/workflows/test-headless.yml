name: Test Headless Mode 🤖

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  test-headless:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        ghidra-version:
          - "12.0"
          - "12.0.1"
          - "12.0.2"
          - "12.0.3"
          - "12.0.4"
          - "latest"
      fail-fast: false  # Continue other tests if one fails

    name: Test on ${{ matrix.os }} / Ghidra ${{ matrix.ghidra-version }}
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        lfs: true

    - name: Set up Java 21
      uses: actions/setup-java@v5
      with:
        java-version: "21"
        distribution: "microsoft"

    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: "3.10"

    - name: Install Ghidra ${{ matrix.ghidra-version }}
      uses: antoniovazquezblanco/setup-ghidra@v2.1.1
      with:
        version: ${{ matrix.ghidra-version }}
        auth_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        gradle-version: "8.14"

    - name: Build ReVa Extension
      run: gradle clean buildExtension --no-build-cache

    - name: Install ReVa Extension to Ghidra
      run: |
        EXTENSION_ZIP=$(ls -1 dist/*.zip | head -n 1)
        echo "Installing extension: $EXTENSION_ZIP"
        unzip -q "$EXTENSION_ZIP" -d "$GHIDRA_INSTALL_DIR/Ghidra/Extensions/"
        ls -la "$GHIDRA_INSTALL_DIR/Ghidra/Extensions/"

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Install Python dependencies
      run: uv sync --prerelease=allow

    - name: Install PyGhidra from local Ghidra
      run: |
        echo "GHIDRA_INSTALL_DIR: $GHIDRA_INSTALL_DIR"
        uv pip install "${GHIDRA_INSTALL_DIR}/Ghidra/Features/PyGhidra/pypkg"

    - name: Verify PyGhidra Installation
      run: |
        uv run python -c "import pyghidra; print(f'PyGhidra version: {pyghidra.__version__}')"
        echo "PyGhidra installed successfully"

    - name: Run Headless Integration Tests
      id: headless_test
      shell: bash
      run: |
        echo "::group::Running headless integration tests"
        # macos-latest (arm64, M1) hosted runners pay PyGhidra/JVM startup
        # per subprocess test (~30-60s each) and the e2e suite spawns
        # mcp-reva fresh for every test via the function-scoped
        # mcp_stdio_client fixture. Sequential, that's ~30-45 min wall-clock
        # for 100+ tests. On macOS we parallelize with pytest-xdist so JVM
        # startups overlap. -n 2 (vs the 3 vCPUs available) keeps headroom
        # for the 7GB RAM cap — each PyGhidra+JVM is ~1.5-2GB. Linux runs
        # sequentially since it's already <10 min and the sequential path
        # is the well-trodden one.
        # Default --dist=load round-robins individual tests across workers,
        # which is what we want: the 66-test workflow_correctness file
        # spreads across both workers instead of piling onto one.
        if [[ "$RUNNER_OS" == "macOS" ]]; then
          PYTEST_NPROC="-n 2"
        else
          PYTEST_NPROC=""
        fi
        uv run pytest tests/ $PYTEST_NPROC -v --timeout=180 --tb=short --junitxml=test-results.xml
        echo "::endgroup::"
      # Sequential macOS used the full 60 min; -n 2 should ~halve that to
      # ~25 min. 40 min leaves room for the first run after the change to
      # surface tuning issues without killing the whole matrix.
      timeout-minutes: 40
      env:
        GHIDRA_INSTALL_DIR: ${{ env.GHIDRA_INSTALL_DIR }}

    - name: Upload test artifacts
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: headless-test-results-${{ matrix.os }}-ghidra-${{ matrix.ghidra-version }}
        path: |
          test-results.xml
          *.log
          .pytest_cache/
          ~/.ghidra/**/application.log
        if-no-files-found: ignore

    - name: Test Summary
      uses: test-summary/action@v2
      with:
        show: "fail, skip"
        paths: test-results.xml
      if: always()
